<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>احجز جلسة - سارة الناصر</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h2>احجز جلستك</h2>
    <form id="bookingForm" class="booking-form">
      <label>الاسم الكامل<input name="name" required></label>
      <label>العمر<input name="age" type="number"></label>
      <label>الهاتف<input name="phone" required></label>
      <label>البريد الإلكتروني<input name="email" type="email"></label>
      <label>الجنس<select name="gender"><option>أنثى</option><option>ذكر</option></select></label>
      <label>طريقة التواصل المفضلة<select name="contactMethod"><option>واتساب</option><option>البريد</option></select></label>
      <label>نوع الجلسة<select name="service"><option>الكوتشنج - 60</option><option>السايكوسوماتيك - 90</option><option>التنويم الإيحائي - 90</option><option>الاستشارة الأسرية</option></select></label>
      <label>التاريخ المفضل<input name="date" type="date"></label>
      <label>الوقت المفضل<input name="time" type="time"></label>
      <label>ملاحظات<textarea name="notes"></textarea></label>
      <button class="btn primary" type="submit">إرسال الطلب</button>
    </form>
    <div id="success" style="display:none;margin-top:16px;padding:12px;background:#e9f7ef;border-radius:8px">تم استلام طلبك. سنعاود التواصل قريبًا.</div>
  </main>
  <script src="booking-script.js"></script>
</body>
</html>
