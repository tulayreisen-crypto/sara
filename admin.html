<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>لوحة التحكم - سارة الناصر</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin {padding:20px}
    .login {max-width:360px;margin:40px auto;background:#fff;padding:16px;border-radius:10px}
    .book-list {margin-top:16px}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #eee;padding:8px;text-align:right}
    .small{font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
  <main class="container admin">
    <div id="loginBox" class="login">
      <h3>تسجيل الدخول إلى لوحة التحكم</h3>
      <label>اسم المستخدم<input id="user" value="admin"></label>
      <label>كلمة المرور<input id="pass" type="password"></label>
      <button id="loginBtn" class="btn primary">دخول</button>
      <p style="font-size:12px;margin-top:8px">كلمة المرور الافتراضية: 1234</p>
    </div>

    <div id="dashboard" style="display:none">
      <h2>لوحة التحكم</h2>
      <section>
        <h4>الإعدادات</h4>
        <label>رقم واتساب<input id="waNumber" placeholder="9665..."></label>
        <button id="saveSettings" class="btn">حفظ</button>
      </section>

      <section>
        <h4>حجوزات واردة</h4>
        <div class="book-list" id="bookings"></div>
      </section>

      <section>
        <h4>الخدمات</h4>
        <div id="servicesList"></div>
        <button id="addService" class="btn">إضافة خدمة</button>
      </section>

      <section>
        <h4>المقالات</h4>
        <div id="articlesList"></div>
        <div style="margin-top:8px">
          <button id="addArticle" class="btn">إضافة مقال جديد</button>
        </div>
      </section>

      <button id="logout" class="btn">خروج</button>
    </div>
  </main>
  <script src="admin-script.js"></script>
  <script src="blog-script.js"></script>
</body>
</html>
